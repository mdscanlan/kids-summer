<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah & Mara Kate ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3B82F6;
      --primary-light: #EFF6FF;
      --primary-dark: #1D4ED8;
      --accent: #10B981;
      --radius: 18px;
      --shadow: 0 2px 16px rgba(0,0,0,0.09);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #F1F5F9;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    .app-header {
      padding: 24px 20px 0;
      text-align: center;
    }
    .app-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #0F172A;
      letter-spacing: -0.5px;
    }
    .app-subtitle {
      font-size: 0.85rem;
      color: #64748B;
      margin-top: 2px;
      font-weight: 600;
    }

    /* ── Profile Switcher ── */
    .profile-switcher {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 20px 0;
    }
    .profile-btn {
      flex: 1;
      max-width: 180px;
      padding: 14px 10px;
      border: 3px solid transparent;
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: #94A3B8;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow);
    }
    .profile-btn .avatar {
      font-size: 2.2rem;
      line-height: 1;
    }
    .profile-btn.active-noah {
      border-color: #3B82F6;
      color: #1D4ED8;
      background: #EFF6FF;
    }
    .profile-btn.active-mk {
      border-color: #A855F7;
      color: #7E22CE;
      background: #FAF5FF;
    }

    /* ── Progress summary ── */
    .day-progress {
      margin: 18px 20px 0;
      background: #fff;
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .day-progress .big-number {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
    }
    .noah-color  { color: #3B82F6; }
    .mk-color    { color: #A855F7; }
    .day-progress .progress-info { flex: 1; }
    .day-progress .progress-info h3 {
      font-size: 0.95rem;
      font-weight: 800;
      color: #0F172A;
    }
    .day-progress .progress-info p {
      font-size: 0.78rem;
      color: #64748B;
      font-weight: 600;
      margin-top: 2px;
    }
    .overall-bar {
      height: 8px;
      border-radius: 99px;
      background: #E2E8F0;
      margin-top: 8px;
      overflow: hidden;
    }
    .overall-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    .noah-bar  { background: linear-gradient(90deg, #3B82F6, #06B6D4); }
    .mk-bar    { background: linear-gradient(90deg, #A855F7, #EC4899); }

    /* ── Section Nav ── */
    .section-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 16px 20px 0;
      scrollbar-width: none;
    }
    .section-nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      white-space: nowrap;
      padding: 8px 14px;
      border: none;
      border-radius: 99px;
      background: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      color: #64748B;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: all 0.15s;
    }
    .nav-btn.active-noah { background: #3B82F6; color: #fff; }
    .nav-btn.active-mk   { background: #A855F7; color: #fff; }

    /* ── Section Cards ── */
    .sections {
      padding: 16px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .section-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: none;
    }
    .section-card.visible { display: block; }

    .section-header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #F1F5F9;
    }
    .section-icon { font-size: 1.6rem; }
    .section-title {
      flex: 1;
      font-size: 1rem;
      font-weight: 900;
      color: #0F172A;
    }
    .section-count {
      font-size: 0.78rem;
      font-weight: 700;
      color: #94A3B8;
    }

    .section-progress {
      height: 5px;
      background: #E2E8F0;
    }
    .section-progress-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    /* ── Checklist Items ── */
    .checklist-items { padding: 8px 0; }
    .checklist-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .checklist-item:hover { background: #F8FAFC; }
    .checklist-item:active { background: #F1F5F9; }

    .item-icon {
      font-size: 1.5rem;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: #F1F5F9;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .item-label {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 700;
      color: #1E293B;
      transition: all 0.2s;
    }
    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    /* Checked state */
    .checklist-item.checked .item-icon {
      background: #DCFCE7;
    }
    .checklist-item.checked .item-label {
      text-decoration: line-through;
      color: #94A3B8;
    }
    .checklist-item.checked .item-check {
      border-color: transparent;
      color: #fff;
    }
    .checklist-item.checked-noah .item-check { background: #3B82F6; }
    .checklist-item.checked-mk   .item-check { background: #A855F7; }
    .checklist-item.checked-noah .item-icon { background: #DBEAFE; }
    .checklist-item.checked-mk   .item-icon { background: #F3E8FF; }

    /* ── Section footer ── */
    .section-footer {
      padding: 10px 18px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 2px solid #F1F5F9;
    }
    .completion-badge {
      font-size: 0.78rem;
      font-weight: 800;
      color: #10B981;
      display: none;
    }
    .completion-badge.show { display: block; }
    .reset-btn {
      font-size: 0.75rem;
      font-weight: 700;
      color: #94A3B8;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      padding: 4px 8px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .reset-btn:hover { background: #F1F5F9; color: #64748B; }

    /* ── Celebration overlay ── */
    .celebration {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .celebration.show { display: flex; }
    .celebration-card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-width: 320px;
    }
    .celebration-emoji { font-size: 3.5rem; }
    .celebration-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: #0F172A;
      margin-top: 10px;
    }
    .celebration-msg {
      font-size: 0.9rem;
      font-weight: 600;
      color: #64748B;
      margin-top: 6px;
      line-height: 1.4;
    }
    .celebration-close {
      margin-top: 18px;
      padding: 12px 28px;
      border: none;
      border-radius: 99px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
    }
    .noah-bg { background: #3B82F6; }
    .mk-bg   { background: #A855F7; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .app-title { font-size: 1.4rem; }
      .checklist-item { padding: 11px 14px; }
      .section-header { padding: 14px 14px 10px; }
    }
  </style>
</head>
<body>

  <div class="app-header">
    <div class="app-title">⭐ Checklist App</div>
    <div class="app-subtitle">Let's get things done!</div>
  </div>

  <!-- Profile Switcher -->
  <div class="profile-switcher">
    <button class="profile-btn" id="btn-noah" onclick="switchProfile('noah')">
      <span class="avatar">🧒</span>
      <span>Noah</span>
    </button>
    <button class="profile-btn" id="btn-mk" onclick="switchProfile('mk')">
      <span class="avatar">👧</span>
      <span>Mara Kate</span>
    </button>
  </div>

  <!-- Day Progress Summary -->
  <div class="day-progress">
    <div class="big-number" id="overall-pct">0%</div>
    <div class="progress-info">
      <h3 id="overall-label">Today's Progress</h3>
      <p id="overall-detail">0 of 0 tasks done</p>
      <div class="overall-bar">
        <div class="overall-bar-fill noah-bar" id="overall-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Section Nav -->
  <div class="section-nav" id="section-nav">
    <button class="nav-btn" data-section="morning"   onclick="showSection('morning')">🌅 Morning</button>
    <button class="nav-btn" data-section="bedtime"   onclick="showSection('bedtime')">🌙 Bedtime</button>
    <button class="nav-btn" data-section="bathroom"  onclick="showSection('bathroom')">🚿 Bathroom</button>
    <button class="nav-btn" data-section="bedrooms"  onclick="showSection('bedrooms')">🛏️ Bedrooms</button>
    <button class="nav-btn" data-section="eow"       onclick="showSection('eow')">📅 Week Reset</button>
  </div>

  <!-- Sections -->
  <div class="sections" id="sections-container"></div>

  <!-- Celebration Overlay -->
  <div class="celebration" id="celebration" onclick="closeCelebration()">
    <div class="celebration-card" onclick="event.stopPropagation()">
      <div class="celebration-emoji" id="cel-emoji">🎉</div>
      <div class="celebration-title" id="cel-title">Amazing!</div>
      <div class="celebration-msg" id="cel-msg">You finished everything!</div>
      <button class="celebration-close" id="cel-btn" onclick="closeCelebration()">Woohoo! 🎊</button>
    </div>
  </div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const SECTIONS = {
  morning: {
    title: "Morning Routine",
    emoji: "🌅",
    label: "Morning",
    items: [
      { id: "brush_teeth",        label: "Brush Teeth",           icon: "🦷" },
      { id: "wash_face",          label: "Wash Face",              icon: "💧" },
      { id: "get_dressed",        label: "Get Dressed",            icon: "👕" },
      { id: "make_bed",           label: "Make Bed",               icon: "🛏️" },
      { id: "breakfast",          label: "Eat Breakfast",          icon: "🍳" },
      { id: "room_reset_morning", label: "Quick Room Reset",       icon: "🧸" },
      { id: "fill_water_bottle",  label: "Fill Water Bottle",      icon: "🥤" },
    ]
  },
  bedtime: {
    title: "Bedtime Routine",
    emoji: "🌙",
    label: "Bedtime",
    items: [
      { id: "shower",             label: "Shower",                 icon: "🚿" },
      { id: "brush_teeth_night",  label: "Brush Teeth",            icon: "🦷" },
      { id: "wash_face_night",    label: "Wash Face",              icon: "💧" },
      { id: "hamper",             label: "Clothes in Hamper",      icon: "🧺" },
      { id: "outfit_prep",        label: "Pick Tomorrow's Outfit", icon: "👚" },
      { id: "room_reset_night",   label: "Room Reset",             icon: "🧸" },
      { id: "reading",            label: "Reading Time",           icon: "📚" },
      { id: "lights_out",         label: "Lights Out",             icon: "🌙" },
    ]
  },
  bathroom: {
    title: "Weekend — Bathroom",
    emoji: "🚿",
    label: "Bathroom",
    items: [
      { id: "wipe_counters",      label: "Wipe Counters",          icon: "🧼" },
      { id: "clean_sink",         label: "Clean Sink",             icon: "🚰" },
      { id: "toilet_wipe",        label: "Toilet Wipe-Down",       icon: "🚽" },
      { id: "restock_tp",         label: "Restock Toilet Paper",   icon: "🧻" },
      { id: "replace_towels",     label: "Replace Towels",         icon: "🩳" },
    ]
  },
  bedrooms: {
    title: "Weekend — Bedrooms",
    emoji: "🛏️",
    label: "Bedrooms",
    items: [
      { id: "change_sheets",      label: "Change Sheets",          icon: "🛏️" },
      { id: "vacuum",             label: "Vacuum or Sweep",        icon: "🧹" },
      { id: "organize_toys",      label: "Organize Toys & Books",  icon: "🧸" },
      { id: "sort_clothes",       label: "Sort Clothes",           icon: "👕" },
    ]
  },
  eow: {
    title: "End-of-Week Reset",
    emoji: "📅",
    label: "Week Reset",
    items: [
      { id: "finish_laundry",     label: "Finish Laundry",         icon: "🧺" },
      { id: "tidy_rooms",         label: "Tidy Rooms",             icon: "🏠" },
      { id: "bathroom_reset",     label: "Bathroom Wipe-Down",     icon: "🧽" },
      { id: "backpack_reset",     label: "Repack Backpacks",       icon: "🎒" },
      { id: "clean_water_bottles",label: "Clean Water Bottles",    icon: "🥤" },
    ]
  }
};

const PROFILES = {
  noah: {
    name: "Noah",
    color: "#3B82F6",
    barClass: "noah-bar",
    colorClass: "noah-color",
    bgClass: "noah-bg",
    activeClass: "active-noah",
    checkedClass: "checked-noah",
    celebrations: [
      { emoji: "🚀", title: "Blast off, Noah!", msg: "You crushed it! Every task done." },
      { emoji: "⚡", title: "Electric, Noah!",  msg: "Nothing can stop you now!" },
      { emoji: "🏆", title: "Champion!",        msg: "Gold medal performance, Noah!" },
    ]
  },
  mk: {
    name: "Mara Kate",
    color: "#A855F7",
    barClass: "mk-bar",
    colorClass: "mk-color",
    bgClass: "mk-bg",
    activeClass: "active-mk",
    checkedClass: "checked-mk",
    celebrations: [
      { emoji: "🌟", title: "Superstar!", msg: "Mara Kate, you're amazing! All done!" },
      { emoji: "🦄", title: "Magical!",   msg: "You did it all, unicorn energy!" },
      { emoji: "🌈", title: "Brilliant!", msg: "Every single task — complete!" },
    ]
  }
};

// ── State ─────────────────────────────────────────────────────────────────
let currentProfile = 'noah';
let currentSection = 'morning';
let state = {}; // state[profile][sectionId][itemId] = true/false

function storageKey(profile) { return `checklist_state_${profile}`; }

function loadState() {
  ['noah','mk'].forEach(p => {
    try {
      const saved = localStorage.getItem(storageKey(p));
      state[p] = saved ? JSON.parse(saved) : {};
    } catch(e) { state[p] = {}; }
    Object.keys(SECTIONS).forEach(s => {
      if (!state[p][s]) state[p][s] = {};
    });
  });
}

function saveState(profile) {
  try { localStorage.setItem(storageKey(profile), JSON.stringify(state[profile])); } catch(e) {}
}

function isChecked(profile, section, itemId) {
  return !!(state[profile]?.[section]?.[itemId]);
}

// ── DOM Helpers ───────────────────────────────────────────────────────────
function getSectionProgress(profile, sectionId) {
  const items = SECTIONS[sectionId].items;
  const done  = items.filter(it => isChecked(profile, sectionId, it.id)).length;
  return { done, total: items.length, pct: items.length ? Math.round(done / items.length * 100) : 0 };
}

function getOverallProgress(profile) {
  let done = 0, total = 0;
  Object.keys(SECTIONS).forEach(s => {
    const p = getSectionProgress(profile, s);
    done  += p.done;
    total += p.total;
  });
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

// ── Render ────────────────────────────────────────────────────────────────
function buildSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  Object.entries(SECTIONS).forEach(([sectionId, section]) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = `section-${sectionId}`;

    card.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${section.emoji}</span>
        <span class="section-title">${section.title}</span>
        <span class="section-count" id="count-${sectionId}">0/${section.items.length}</span>
      </div>
      <div class="section-progress">
        <div class="section-progress-fill" id="bar-${sectionId}" style="width:0%"></div>
      </div>
      <div class="checklist-items" id="items-${sectionId}"></div>
      <div class="section-footer">
        <span class="completion-badge" id="badge-${sectionId}">✅ Section complete!</span>
        <button class="reset-btn" onclick="resetSection('${sectionId}')">↺ Reset</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function renderSection(sectionId) {
  const profile = currentProfile;
  const prof    = PROFILES[profile];
  const section = SECTIONS[sectionId];
  const itemsEl = document.getElementById(`items-${sectionId}`);

  itemsEl.innerHTML = '';
  section.items.forEach(item => {
    const checked = isChecked(profile, sectionId, item.id);
    const div = document.createElement('div');
    div.className = `checklist-item${checked ? ` checked ${prof.checkedClass}` : ''}`;
    div.setAttribute('data-section', sectionId);
    div.setAttribute('data-item', item.id);
    div.onclick = () => toggleItem(sectionId, item.id);
    div.innerHTML = `
      <div class="item-icon">${item.icon}</div>
      <div class="item-label">${item.label}</div>
      <div class="item-check">${checked ? '✓' : ''}</div>
    `;
    itemsEl.appendChild(div);
  });

  updateSectionUI(sectionId);
}

function updateSectionUI(sectionId) {
  const profile = currentProfile;
  const prof    = PROFILES[profile];
  const prog    = getSectionProgress(profile, sectionId);

  const bar   = document.getElementById(`bar-${sectionId}`);
  const count = document.getElementById(`count-${sectionId}`);
  const badge = document.getElementById(`badge-${sectionId}`);

  bar.style.width      = prog.pct + '%';
  bar.style.background = prof.color;
  count.textContent    = `${prog.done}/${prog.total}`;

  if (prog.done === prog.total && prog.total > 0) {
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  updateOverallUI();
}

function updateOverallUI() {
  const profile = currentProfile;
  const prof    = PROFILES[profile];
  const prog    = getOverallProgress(profile);

  document.getElementById('overall-pct').textContent    = prog.pct + '%';
  document.getElementById('overall-pct').className      = `big-number ${prof.colorClass}`;
  document.getElementById('overall-detail').textContent = `${prog.done} of ${prog.total} tasks done`;
  document.getElementById('overall-label').textContent  = `${prof.name}'s Progress`;

  const bar = document.getElementById('overall-bar');
  bar.style.width = prog.pct + '%';
  bar.className   = `overall-bar-fill ${prof.barClass}`;
}

function renderAll() {
  Object.keys(SECTIONS).forEach(s => renderSection(s));
}

// ── Toggle ────────────────────────────────────────────────────────────────
let celebrationQueued = false;

function toggleItem(sectionId, itemId) {
  const profile = currentProfile;
  const was = isChecked(profile, sectionId, itemId);
  state[profile][sectionId][itemId] = !was;
  saveState(profile);

  // Update just this item's DOM
  const prof  = PROFILES[profile];
  const items = document.querySelectorAll(`[data-section="${sectionId}"][data-item="${itemId}"]`);
  items.forEach(div => {
    const checked = !was;
    div.className = `checklist-item${checked ? ` checked ${prof.checkedClass}` : ''}`;
    div.querySelector('.item-check').textContent = checked ? '✓' : '';
  });

  updateSectionUI(sectionId);

  // Check if whole section just completed
  if (!was) {
    const prog = getSectionProgress(profile, sectionId);
    if (prog.done === prog.total && !celebrationQueued) {
      celebrationQueued = true;
      setTimeout(() => { showCelebration(); celebrationQueued = false; }, 300);
    }
  }
}

function resetSection(sectionId) {
  const profile = currentProfile;
  state[profile][sectionId] = {};
  saveState(profile);
  renderSection(sectionId);
}

// ── Profile Switch ─────────────────────────────────────────────────────────
function switchProfile(profile) {
  currentProfile = profile;

  // Update buttons
  document.getElementById('btn-noah').className = `profile-btn${profile === 'noah' ? ' active-noah' : ''}`;
  document.getElementById('btn-mk').className   = `profile-btn${profile === 'mk'   ? ' active-mk'   : ''}`;

  // Update nav buttons
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const active = btn.dataset.section === currentSection;
    btn.className = active ? `nav-btn ${PROFILES[profile].activeClass}` : 'nav-btn';
  });

  renderAll();
  showSection(currentSection, true);
  try { localStorage.setItem('checklist_current_profile', profile); } catch(e) {}
}

// ── Section Nav ────────────────────────────────────────────────────────────
function showSection(sectionId, skipNavUpdate) {
  currentSection = sectionId;
  const prof = PROFILES[currentProfile];

  // Toggle section cards
  Object.keys(SECTIONS).forEach(s => {
    const card = document.getElementById(`section-${s}`);
    card.classList.toggle('visible', s === sectionId);
  });

  // Update nav active state
  if (!skipNavUpdate) {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      const active = btn.dataset.section === sectionId;
      btn.className = active ? `nav-btn ${prof.activeClass}` : 'nav-btn';
    });
  }

  try { localStorage.setItem('checklist_current_section', sectionId); } catch(e) {}
}

// ── Celebration ────────────────────────────────────────────────────────────
function showCelebration() {
  const prof = PROFILES[currentProfile];
  const cel  = prof.celebrations[Math.floor(Math.random() * prof.celebrations.length)];
  document.getElementById('cel-emoji').textContent = cel.emoji;
  document.getElementById('cel-title').textContent = cel.title;
  document.getElementById('cel-msg').textContent   = cel.msg;
  document.getElementById('cel-btn').className     = `celebration-close ${prof.bgClass}`;
  document.getElementById('celebration').classList.add('show');
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

// ── Init ───────────────────────────────────────────────────────────────────
(function init() {
  loadState();
  buildSections();

  // Restore last profile/section
  let savedProfile = 'noah';
  let savedSection = 'morning';
  try {
    savedProfile = localStorage.getItem('checklist_current_profile') || 'noah';
    savedSection = localStorage.getItem('checklist_current_section') || 'morning';
  } catch(e) {}

  if (!PROFILES[savedProfile])  savedProfile = 'noah';
  if (!SECTIONS[savedSection])  savedSection = 'morning';

  currentProfile = savedProfile;
  currentSection = savedSection;

  renderAll();
  switchProfile(savedProfile);
  showSection(savedSection);
})();
</script>
</body>
